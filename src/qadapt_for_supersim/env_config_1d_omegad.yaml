# Diagnostic env config: full sampling distribution but ONLY omega_d varies.
# All other 4 params are pinned at GT, hardware imperfections zeroed, cross-talk zeroed.
# Use this to verify the algorithm can solve a single-dimension navigation problem
# before scaling up to the full 5-D task.

simulator:
  max_steps: 20
  alone_enabled: false

env_type: "supersims"

# 1-D diagnostic config: identical to parameter_config.json EXCEPT omega_d sampling
# is widened from sigma=0.01 GHz to 0.033 GHz (3σ = 100 MHz = full safety rail).
# This gives the agent a real signal — typical detuning ~33 MHz vs action half-span 50 MHz.
parameter_config_filename: "parameter_config_1d_omegad.json"

# Action scale: matches what worked in run8 on medium. Even with a 1-D task,
# random-walk noise from std=0.05 over 20 steps × delta_scale_factor 0.33 gives
# RMS drift ~7% of half-span — small enough to allow recovery if the agent moves
# the wrong way initially.
delta_scale_factor: 0.33

policy_split: "per_param"

# Diagnostic mode: fix everything except omega_d at GT.
pin_to_gt: ["omega_01", "phi", "Omega", "beta"]
zero_hw: true
zero_crosstalk: true
