# Training configuration for SuperSims All-XY env (QAdapt PPO swarm).
#
# Run with:
#   uv run python src/qadapt/training/train.py \
#     --config src/qadapt_for_supersim/training_config.yaml \
#     --env-config src/qadapt_for_supersim/env_config.yaml \
#     --disable-wandb
#
# All N qubits are agents under the single shared `qubit_policy`.

defaults:
  num_iterations: 200         # long-horizon grouped run (2026-05-03)
  delete_old_checkpoints: true
  save_distance_data: false   # not yet plumbed for supersims agents

wandb:
  entity: "anon-entity"
  project: "RLModel"
  ema_period: 20

ray:
  include_dashboard: false
  log_to_driver: false
  logging_level: 40
  runtime_env:
    excludes:
      - "dataset"
      - "dataset_v1"
      - "wandb"
      - "**/wandb/**"
      - "outputs"
      - "test_outputs"
      - "checkpoints"
      - "checkpoints_supersims*"
      - "weights*"
      - "*dataset*"
      - "**/weights/**"
      - "**/symmetric_weights_*/**"
      - "**/mobilenet_*/**"
      - "**/data/**"
      - "**/scan_captures/**"
      - "**/rollout_scans/**"
      - "eval_runs"
      - "**/eval_runs/**"
      - "**/__pycache__/**"
    env_vars:
      # GPU is required for the All-XY sim (CPU is ~30× slower for 4 qubits).
      # Both env runners and the learner need CUDA visibility; Ray fractional
      # allocation handles sharing. dynamiqs's io_callback also needs CPU available.
      JAX_PLATFORM_NAME: "cuda"
      JAX_PLATFORMS: "cuda,cpu"
      PYTHONWARNINGS: "ignore::DeprecationWarning,ignore::FutureWarning"
      RAY_DISABLE_IMPORT_WARNING: "1"
      RAY_METRICS_EXPORT_INTERVAL_MS: "0"
      XLA_PYTHON_CLIENT_PREALLOCATE: "false"
      XLA_PYTHON_CLIENT_MEM_FRACTION: "0.25"
      JAX_ENABLE_X64: "true"

rl_config:
  algorithm: "PPO"

  env_runners:
    # 6 env runners × 1 GPU each (one runner per visible GPU). Avoids per-GPU
    # contention between sim + learner. Each runner JITs dynamiqs once and runs
    # full-bandwidth from then on.
    num_env_runners: 6
    rollout_fragment_length: 20    # one full episode per fragment
    sample_timeout_s: 1200.0
    num_gpus_per_env_runner: 1.0

  learners:
    num_learners: 1
    num_gpus_per_learner: 1.0      # dedicated GPU for the PPO learner (MLP backprop)

  training:
    # agent_steps total per iter. In per_param mode each env step generates
    # N_QUBITS × 5 = 20 agent_steps (was 4 in per_qubit mode), so a 5× larger total
    # gives each per-param policy ~2048 transitions per iter (matches the old single
    # policy's data budget) and keeps env steps per runner per iter at ~85 — same
    # wall-clock per iter as the per_qubit run.
    train_batch_size: 10240
    minibatch_size: 256
    num_epochs: 10
    grad_clip: 40.0
    grad_clip_by: "norm"

    lr: 0.0005
    gamma: 0.0
    lambda_: 0.95
    clip_param: 0.2
    # entropy_coeff=0 with state-independent free_log_std (below): the entropy
    # bonus is a constant upward force on log_std; with free_log_std we want PPO
    # to descend log_std as low as the reward signal demands. Smooth single-optimum
    # task → no premature-collapse risk.
    entropy_coeff: 0.0
    vf_loss_coeff: 0.5
    kl_target: 0.01

    # SAC fields are unused but kept for schema parity with the existing config flow.
    actor_lr: 0.0003
    critic_lr: 0.0003
    alpha_lr: 0.0003
    twin_q: true
    tau: 0.005
    initial_alpha: 1.0
    target_entropy: "auto"
    n_step: 1
    clip_actions: true
    target_network_update_freq: 1
    num_steps_sampled_before_learning_starts: 1000
    replay_buffer_config: {
      "type": "MultiAgentPrioritizedEpisodeReplayBuffer",
      "capacity": 1000000,
      "alpha": 0.6,
      "beta": 0.4,
    }

  multi_agent:
    # With env_config.policy_split == "grouped", the wrapper exposes 2 shared
    # policies — one per param-group. Names must match policy_mapping_fn:
    # qubit_<i>_<groupname>  ->  <groupname>_policy. groupname ∈ {freq, env}.
    policies:
      - "freq_policy"
      - "env_policy"
    policies_to_train:
      - "freq_policy"
      - "env_policy"
    count_steps_by: "agent_steps"

    # State-independent log_std (free_log_std=true): a single learnable
    # nn.Parameter per action dim, broadcast to the batch. Standard PPO continuous-
    # control pattern (SB3 / OpenAI baselines / CleanRL). Avoids the dead-gradient
    # pathology of the state-dependent path where orth-init places raw log_std
    # above the upper bound and the hard clamp kills its gradient.
    free_log_std: true
    log_std_init: -2.3       # std=exp(-2.3)≈0.1, modest exploration to start
    log_std_bounds: null     # bounds re-introduce the dead-gradient problem

checkpoints:
  save_dir: "./checkpoints_supersims_grouped"
  upload_best_only: true

# Unused for supersims (no GIF rendering yet) — kept so the existing config flow doesn't crash.
gif_config:
  enabled: false
  target_agent_type: "qubit"
  target_agent_indices: []
  save_dir: "/tmp/supersims_gifs"
  fps: 0.5

neural_networks:
  qubit_policy:
    backbone:
      type: "MLP"
      hidden_layers: [128, 128]
      feature_size: 128
      activation: "relu"
      memory_layer: null
    policy_head:
      hidden_layers: [128, 64]
      activation: "relu"
      use_attention: false
    value_head:
      hidden_layers: [128, 64]
      activation: "relu"
      use_attention: false
