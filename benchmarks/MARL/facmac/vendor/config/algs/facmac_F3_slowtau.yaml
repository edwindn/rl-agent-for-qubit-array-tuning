# FACMAC config for quantum device tuning.
# Seeded from vendor/config/algs/facmac_pp.yaml, key overrides noted inline.

# === OVERRIDES SPECIFIC TO THIS BENCHMARK ===
obs_agent_id: False        # REQUIRED for cross-size zero-shot eval (basic_controller.py:81-82 appends n_agents-dim one-hot otherwise)
obs_last_action: True      # safe — scalar per-agent action, size-independent
mac: grouped_mac           # our custom GroupedMAC (registered in train.py)
agent: grouped             # sentinel; actual per-group modules are in args.agent_modules
agent_modules:
  plunger: plunger_cnn
  barrier: barrier_cnn

# === INHERITED FROM facmac_pp.yaml ===
action_range: ~
action_selector: ~
agent_output_type: ~
batch_size_run: 26    # parallel runner ramp from default 1 (rescue: bsr=1 was hitting <2010 t_env in 30+ min)
batch_size: 32
buffer_size: 5000
buffer_warmup: 0
discretize_actions: False
double_q: False
exploration_mode: "gaussian"
start_steps: 0
act_noise: 0.1
ou_theta: 0.15
ou_sigma: 0.2
ou_noise_scale: 0.3
final_ou_noise_scale: 0.
ou_stop_episode: 100
gamma: 0.99                # was 0.85 for matrix game — bumped for longer episodes
grad_norm_clip: 0.5
learner: "facmac_learner"
learn_interval: 1
lr: 0.0003                 # was 0.01 for matrix game — lowered for CNN stability
critic_lr: 0.0003
td_lambda: 0.8
critic_train_reps: 1
q_nstep: 0
mixer: "qmix"
mixing_embed_dim: 64
skip_connections: False
gated: False
hypernet_layers: 1
hypernet_embed: 64
hyper_initialization_nonzeros: 0
name: "facmac_F3_slowtau"
n_runners: ~
n_train: 1
optimizer: adam
optimizer_epsilon: 0.01
rnn_hidden_dim: 64
run_mode: ~
runner: "parallel"    # rescue: parallel runner needed for FACMAC throughput (was: "episode" with bsr=1)
runner_scope: 'episodic'
target_update_interval: ~
target_update_mode: 'soft'
target_update_tau: 0.001   # F3: tau 0.005 -> 0.001 (slower target tracking)
test_greedy: ~
test_interval: 10000
test_nepisode: 10
testing_on: True
t_max: 2000000
save_model: True
save_model_interval: 50000
verbose: False
weight_decay: True
weight_decay_factor: 0.0001
env_args:
  state_last_action: False
agent_return_logits: False
q_embed_dim: 1
noise_clip: 0.5

# wandb
use_wandb: True
wandb_project: "FACMAC-rescue"
wandb_entity: "rl_agents_for_tuning"
wandb_ema_period: 20
