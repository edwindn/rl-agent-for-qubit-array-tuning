env: "pymarl_quantum"

# Sacred env config for the full FACMAC training run. env_args paths are
# injected by train.py at runtime; log intervals chosen for ~100 wandb
# datapoints over t_max=500_000.

test_interval: 20000
runner_log_interval: 5000
learner_log_interval: 5000
log_interval: 5000

env_args:
  env_config_path: null
  capacitance_model_checkpoint: null
  training: true
